name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  portable:
    runs-on: macos-14
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: bash -n scripts/capture.sh scripts/review.sh tests/test_capture.sh tests/test_review.sh
      - name: Validate Python scripts
        run: python3 -m py_compile scripts/proofctl.py tests/test_proofctl.py
      - name: Run safety tests
        run: |
          tests/test_capture.sh
          tests/test_review.sh
          tests/test_proofctl.py
      - name: Validate skill metadata
        run: |
          ruby -e '
            require "yaml"
            text = File.read("SKILL.md")
            frontmatter = text.match(/\A---\n(.*?)\n---\n/m) or abort "missing frontmatter"
            metadata = YAML.safe_load(frontmatter[1])
            abort "invalid frontmatter keys" unless metadata.keys.sort == %w[description name]
            abort "wrong skill name" unless metadata["name"] == "simulator-visual-proof"
            YAML.safe_load(File.read("agents/openai.yaml"))
          '
