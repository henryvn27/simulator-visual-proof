<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Simulator Visual Proof</title>
  <desc id="desc">A dark technical banner showing an iPhone simulator recording timeline and verified proof artifacts.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11141a"/>
      <stop offset="1" stop-color="#171b23"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#050609" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="#0c0e12"/>
  <path d="M0 88H1200M0 210H1200M0 332H1200M160 0V420M430 0V420M700 0V420M970 0V420" stroke="#20242d" stroke-width="1" opacity=".45"/>

  <g transform="translate(68 58)">
    <circle cx="8" cy="8" r="8" fill="#ff4d5e"/>
    <text x="30" y="14" fill="#9ca5b5" font-family="'SFMono-Regular','IBM Plex Mono',monospace" font-size="14" letter-spacing="2">RECORDING_STARTED</text>
    <text x="0" y="96" fill="#f3f5f8" font-family="'Avenir Next','SF Pro Display',sans-serif" font-size="52" font-weight="700">Make your agent</text>
    <text x="0" y="154" fill="#f3f5f8" font-family="'Avenir Next','SF Pro Display',sans-serif" font-size="52" font-weight="700">show its work.</text>
    <text x="2" y="203" fill="#9ca5b5" font-family="'Avenir Next','SF Pro Text',sans-serif" font-size="19">Screenshots. Interactions. Playable simulator proof.</text>
    <g transform="translate(0 246)">
      <rect width="408" height="48" rx="5" fill="#171b23" stroke="#303643"/>
      <text x="18" y="30" fill="#cbd2dc" font-family="'SFMono-Regular','IBM Plex Mono',monospace" font-size="13">npx skills add henryvn27/simulator-visual-proof -g</text>
    </g>
  </g>

  <g transform="translate(724 38)" filter="url(#shadow)">
    <rect width="266" height="344" rx="36" fill="url(#surface)" stroke="#3a404c" stroke-width="2"/>
    <rect x="14" y="14" width="238" height="316" rx="26" fill="#e9ebee"/>
    <rect x="91" y="23" width="84" height="20" rx="10" fill="#17191e"/>
    <rect x="34" y="68" width="124" height="12" rx="6" fill="#222730"/>
    <rect x="34" y="91" width="194" height="7" rx="3.5" fill="#a7adb7"/>
    <g transform="translate(34 128)">
      <rect width="194" height="48" rx="10" fill="#f8f9fa" stroke="#cfd3d9"/>
      <circle cx="22" cy="24" r="7" fill="#ff4d5e"/>
      <rect x="42" y="17" width="82" height="7" rx="3.5" fill="#30353e"/>
      <rect x="42" y="29" width="54" height="5" rx="2.5" fill="#a7adb7"/>
    </g>
    <g transform="translate(34 188)">
