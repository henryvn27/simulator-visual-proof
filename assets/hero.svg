      <rect x="18" y="17" width="14" height="14" rx="3" fill="#ff4d5e"/>
      <rect x="42" y="17" width="104" height="7" rx="3.5" fill="#30353e"/>
      <rect x="42" y="29" width="70" height="5" rx="2.5" fill="#a7adb7"/>
    </g>
    <g transform="translate(34 248)">
      <rect width="194" height="48" rx="10" fill="#f8f9fa" stroke="#cfd3d9"/>
      <path d="M18 24l6 6 11-13" fill="none" stroke="#28a36a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="42" y="17" width="92" height="7" rx="3.5" fill="#30353e"/>
      <rect x="42" y="29" width="118" height="5" rx="2.5" fill="#a7adb7"/>
    </g>
